<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barry Data & Analytics</title>

<meta name="description" content="Barry Data & Analytics – KPI Dashboards, automatisiertes Reporting und Datenanalyse für Unternehmen.">
<meta name="keywords" content="Data Analytics, KPI Dashboard, Reporting, Power BI, Excel, Forecasting">

<style>
:root{
--bg:#0A1A2F;
--card:#1B2228;
--accent:#00C2C7;
--orange:#E67E22;
--text:#fff;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
scroll-behavior:smooth;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
border-bottom:1px solid var(--accent);
position:sticky;
top:0;
background:var(--bg);
z-index:1000;
}

nav a{
color:white;
margin-right:15px;
text-decoration:none;
font-size:14px;
}

.lang button{
background:transparent;
border:1px solid var(--accent);
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

/* HERO */
.hero{
text-align:center;
padding:70px 20px 40px;
}

.hero h1{
font-size:42px;
margin:10px 0;
font-weight:900;
}

.hero p{
font-size:18px;
opacity:0.9;
}

/* SLIDER */
.slider{
display:flex;
overflow:hidden;
max-width:1000px;
margin:40px auto;
border-radius:12px;
border:2px solid var(--accent);
}

.slide{
min-width:100%;
padding:40px;
text-align:center;
background:var(--card);
animation:slide 15s infinite;
}

@keyframes slide{
0%{transform:translateX(0)}
33%{transform:translateX(-100%)}
66%{transform:translateX(-200%)}
100%{transform:translateX(0)}
}

/* GRID */
.section{
max-width:1200px;
margin:80px auto;
padding:0 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:25px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.card:hover{
border-color:var(--accent);
transform:translateY(-5px);
}

/* FORM */
form{
display:grid;
gap:15px;
}

input, textarea, select{
padding:12px;
border-radius:8px;
border:1px solid #333;
background:#0d1624;
color:white;
}

button{
background:var(--orange);
border:none;
padding:15px;
border-radius:30px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */
footer{
text-align:center;
padding:40px;
opacity:0.6;
}
</style>
</head>

<body>

<div><strong>Barry Data & Analytics</strong></div>
