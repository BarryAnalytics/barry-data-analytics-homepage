<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barry Data & Analytics – Kontakt</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #4de2e8;
            --bg: #0b111a;
            --glass: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(0, 0, 0, 0.2);
            --text: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }

        /* NAVIGATION AUS DEINEM SCREENSHOT */
        header {
            padding: 30px 5%; display: flex; justify-content: space-between; align-items: flex-start;
            position: sticky; top: 0; background: rgba(11, 17, 26, 0.95); backdrop-filter: blur(15px); z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; }
        .nav-menu { text-align: center; }
        .nav-menu a { display: block; color: var(--text); text-decoration: none; font-size: 0.85rem; opacity: 0.6; margin-bottom: 5px; transition: 0.3s; }
        .nav-menu a:hover, .nav-menu a.active { opacity: 1; color: var(--primary); }

        .lang-pills { display: flex; gap: 5px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 8px; }
        .lang-link { padding: 6px 12px; border-radius: 6px; text-decoration: none; color: white; font-size: 0.75rem; font-weight: 700; }
        .lang-link.active { background: var(--primary); color: #000; }

        /* KONTAKT SEKTION */
        .contact-container { max-width: 1100px; margin: 80px auto; padding: 0 5%; }
        
        .contact-grid {
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 60px;
            background: var(--glass); border: 1px solid rgba(77, 226, 232, 0.1);
            padding: 50px; border-radius: 30px; backdrop-filter: blur(20px);
        }

        .contact-info h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; line-height: 1.1; }
        .contact-info p { opacity: 0.7; margin-bottom: 30px; font-size: 1rem; }

        .info-item { margin-bottom: 25px; }
        .info-item label { display: block; color: var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .info-item span { font-size: 1.1rem; font-weight: 600; }

        /* FORMULAR STYLING */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; opacity: 0.9; }
        
        input, select, textarea {
            width: 100%; padding: 14px 18px; background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; font-family: inherit; font-size: 1rem; transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary); background: rgba(77, 226, 232, 0.05);
        }

        .submit-btn {
            width: 100%; padding: 16px; background: var(--primary); color: #000;
            border: none; border-radius: 12px; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(77, 226, 232, 0.3); }

        @media (max-width: 850px) {
            .contact-grid { grid-template-columns: 1fr; padding: 30px; }
            .contact-info h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Barry Data & Analytics</div>
        <nav class="nav-menu">
            <a href="#">Startseite</a>
            <a href="#">Über mich</a>
            <a href="#">Leistungen</a>
            <a href="#">Anwendungsbeispiele</a>
            <a href="#" class="active">Kontakt</a>
        </nav>
        <div class="lang-pills">
            <a href="#" class="lang-link active">DE</a>
            <a href="#" class="lang-link">EN</a>
            <a href="#" class="lang-link">FR</a>
        </div>
    </header>

    <main class="contact-container">
        <div class="contact-grid">
            
            <div class="contact-info">
                <h2>Kontakt & <span style="color:var(--primary)">Projektanfrage</span></h2>
                <p>Schreiben Sie mir kurz, wobei Sie Unterstützung benötigen. Ich melde mich innerhalb von 24h bei Ihnen.</p>
                
                <div class="info-item">
                    <label>E-Mail</label>
                    <span>hello@barry-analytics.de</span>
                </div>
                <div class="info-item">
                    <label>Ahmed Barry</label>
                    <span>Data Architect & Consultant</span>
                </div>
            </div>

            <form action="#">
                <div class="form-group">
                    <label for="name">Name*</label>
                    <input type="text" id="name" placeholder="Ihr vollständiger Name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">E-Mail*</label>
                    <input type="email" id="email" placeholder="beispiel@domain.de" required>
                </div>

                <div class="form-group">
                    <label for="project-type">Art des Projekts*</label>
                    <select id="project-type" required>
                        <option value="" disabled selected>Bitte wählen...</option>
                        <option value="dashboards">KPI Dashboards & Reporting</option>
                        <option value="automation">Automatisierung & Datenflüsse</option>
                        <option value="quality">Datenstruktur & Qualität verbessern</option>
                        <option value="forecasting">Forecasting & Analyse</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Nachricht*</label>
                    <textarea id="message" rows="5" placeholder="Beschreiben Sie kurz Ihr Vorhaben..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Absenden</button>
            </form>

        </div>
    </main>

</body>
</html>
