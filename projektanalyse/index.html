<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Digitale Projektanalyse | Barry Data & Analytics</title>

  <style>
    :root {
      --bg:#030712;
      --panel:rgba(15,23,42,.94);
      --field:#1e293b;
      --border:#334155;
      --soft:rgba(148,163,184,.22);
      --muted:#94a3b8;
      --text:#f8fafc;
      --cyan:#00f2fe;
      --cyan2:#00d8e4;
      --max:900px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top left,rgba(0,242,254,.10),transparent 34%),
        radial-gradient(circle at bottom right,rgba(37,99,235,.14),transparent 36%),
        var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      padding-top:125px;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:100;
      background:rgba(3,7,18,.9);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(148,163,184,.18);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:16px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .brand-logo{
      width:160px;
      height:50px;
      display:flex;
      align-items:center;
      flex-shrink:0;
    }

    .brand-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:left center;
    }

    .nav-badge{
      color:var(--cyan);
      background:rgba(0,242,254,.10);
      border:1px solid rgba(0,242,254,.22);
      padding:8px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.07em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .home-link,.lang-btn{
      border:1px solid rgba(148,163,184,.28);
      background:rgba(30,41,59,.82);
      color:#dbeafe;
      border-radius:999px;
      padding:8px 10px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
    }

    .home-link{
      border-color:rgba(0,242,254,.28);
      background:rgba(0,242,254,.08);
      color:var(--cyan);
    }

    .lang-btn.active{
      background:var(--cyan);
      color:#020617;
      border-color:var(--cyan);
    }

    .page{
      display:flex;
      justify-content:center;
      padding:24px;
    }

    .container{
      width:100%;
      max-width:var(--max);
      background:var(--panel);
      border:1px solid var(--soft);
      border-radius:26px;
      box-shadow:0 24px 80px rgba(0,0,0,.46);
      padding:34px;
    }

    .badge{
      display:inline-block;
      color:var(--cyan);
      background:rgba(0,242,254,.08);
      border:1px solid rgba(0,242,254,.18);
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    h1{
      margin:20px 0 16px;
      font-size:clamp(30px,4vw,46px);
      line-height:1.1;
      letter-spacing:-.03em;
      color:#ffffff;
    }

    .intro{
      color:var(--muted);
      line-height:1.75;
      max-width:760px;
      font-size:15px;
      margin-bottom:30px;
    }

    .intro strong{color:#e2e8f0}

    form{
      display:grid;
      gap:24px;
    }

    .section{
      border-top:1px solid rgba(148,163,184,.18);
      padding-top:24px;
    }

    .section-title{
      font-size:15px;
      color:var(--cyan);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:900;
      margin-bottom:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    label.field-label{
      display:block;
      font-size:13px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.06em;
      color:#cbd5e1;
      margin-bottom:9px;
    }

    input,select,textarea{
      width:100%;
      color:var(--text);
      background:var(--field);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      outline:none;
      font-size:15px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
      line-height:1.55;
    }

    input:focus,select:focus,textarea:focus{
      border-color:var(--cyan);
      box-shadow:0 0 0 3px rgba(0,242,254,.14);
    }

    .options{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .choice{
      display:flex;
      gap:10px;
      padding:12px;
      border:1px solid var(--border);
      background:rgba(30,41,59,.72);
      border-radius:14px;
      color:#e2e8f0;
      font-size:14px;
      line-height:1.45;
      cursor:pointer;
    }

    .choice input{
      width:auto;
      margin-top:2px;
      accent-color:var(--cyan);
    }

    .small-note{
      color:var(--muted);
      font-size:12px;
      line-height:1.55;
      margin-top:8px;
    }

    .privacy-box{
      display:grid;
      gap:12px;
      padding:16px;
      border-radius:16px;
      background:rgba(30,41,59,.55);
      border:1px solid rgba(148,163,184,.20);
      color:#cbd5e1;
      font-size:14px;
      line-height:1.6;
    }

    .checkbox-line{
      display:flex;
      gap:12px;
      align-items:flex-start;
    }

    .checkbox-line input{
      width:auto;
      margin-top:4px;
      accent-color:var(--cyan);
    }

    details{
      border-top:1px solid rgba(148,163,184,.18);
      padding-top:10px;
    }

    summary{
      color:var(--cyan);
      cursor:pointer;
      font-weight:800;
    }

    .submit-btn{
      width:100%;
      border:0;
      border-radius:16px;
      padding:17px 20px;
      background:var(--cyan);
      color:#020617;
      font-size:15px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      cursor:pointer;
      box-shadow:0 18px 40px rgba(0,242,254,.18);
    }

    .submit-btn:hover{background:var(--cyan2)}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed}

    .error{
      display:none;
      padding:14px;
      border-radius:14px;
      background:rgba(239,68,68,.11);
      border:1px solid rgba(239,68,68,.28);
      color:#fecaca;
      font-size:14px;
      line-height:1.5;
    }

    .success{
      display:none;
      text-align:center;
      padding:42px 10px;
    }

    .success-icon{
      width:76px;
      height:76px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 24px;
      border-radius:999px;
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.35);
      color:#4ade80;
      font-size:38px;
      font-weight:900;
    }

    .success h2{
      font-size:clamp(24px,4vw,34px);
      margin:0 0 12px;
    }

    .success p{
      color:var(--muted);
      line-height:1.7;
      max-width:640px;
      margin:0 auto 18px;
    }

    @media(max-width:760px){
      body{padding-top:115px}
      .topbar-inner{padding:12px 14px}
      .brand-logo{width:125px;height:42px}
      .nav-badge{display:none}
      .home-link,.lang-btn{padding:8px 8px;font-size:11px}
      .page{padding:14px}
      .container{padding:22px;border-radius:22px}
      .grid,.options{grid-template-columns:1fr}
    }
  </style>
</head>

function setSelect(id, arr){
  const el=document.getElementById(id);
  el.innerHTML="";
  arr.forEach(v=>{
    const o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    el.appendChild(o);
  });
}

function setProjects(arr){
  const box=document.getElementById("projectOptions");
  box.innerHTML="";
  arr.forEach(v=>{
    const label=document.createElement("label");
    label.className="choice";
    label.innerHTML=`<input type="checkbox" name="project_type" value="${v}"><span>${v}</span>`;
    box.appendChild(label);
  });
}

function setLang(lang){
  const t=T[lang];

  document.documentElement.lang=lang;
  document.getElementById("language").value=lang;

  document.querySelectorAll(".lang-btn").forEach(btn=>{
    btn.classList.toggle("active",btn.dataset.lang===lang);
  });

  document.getElementById("homeLink").textContent=t.homeLink;
  document.getElementById("navBadge").textContent=t.navBadge;
  document.getElementById("badgeText").textContent=t.badgeText;
  document.getElementById("mainTitle").textContent=t.mainTitle;
  document.getElementById("introText").innerHTML=t.introText;

  Object.keys(t.labels).forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.textContent=t.labels[id];
  });

  Object.keys(t.placeholders).forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.placeholder=t.placeholders[id];
  });

  setProjects(t.projects);
  setSelect("timeline",t.timeline);
  setSelect("priority",t.priority);
  setSelect("frequency",t.frequency);
  setSelect("data_source",t.dataSources);
}

function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

document.querySelectorAll(".lang-btn").forEach(btn=>{
  btn.addEventListener("click",()=>setLang(btn.dataset.lang));
});

document.getElementById("projectForm").addEventListener("submit",async function(e){
  e.preventDefault();

  const lang=document.getElementById("language").value;
  const t=T[lang];

  const errorBox=document.getElementById("errorBox");
  const submitBtn=document.getElementById("submitBtn");

  errorBox.style.display="none";

  const data={
    language:lang,
    name:document.getElementById("name").value.trim(),
    company:document.getElementById("company").value.trim(),
    email:document.getElementById("email").value.trim(),
    phone:document.getElementById("phone").value.trim(),
    project_type:[...document.querySelectorAll('input[name="project_type"]:checked')].map(x=>x.value),
    timeline:document.getElementById("timeline").value,
    priority:document.getElementById("priority").value,
    frequency:document.getElementById("frequency").value,
    data_source:document.getElementById("data_source").value,
    goal:document.getElementById("goal").value.trim(),
    challenge:document.getElementById("challenge").value.trim(),
    expected:document.getElementById("expected").value.trim(),
    description:document.getElementById("desc").value.trim(),
    privacy_accepted:document.getElementById("privacyAccepted").checked,
    submitted_at:new Date().toISOString(),
    source:"Digitale Projektanalyse"
  };

  if(!data.name || !data.email || !data.privacy_accepted){
    errorBox.textContent=t.labels.errorBox;
    errorBox.style.display="block";
    return;
  }

  if(!isValidEmail(data.email)){
    errorBox.textContent=t.labels.invalidEmail;
    errorBox.style.display="block";
    return;
  }

  submitBtn.disabled=true;
  submitBtn.textContent=t.sending;

  try{
    if(FLOW_URL==="DEINE_POWER_AUTOMATE_FLOW_URL_HIER_EINTRAGEN"){
      console.log("Power Automate Payload:",data);
    }else{
      await fetch(FLOW_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
      });
    }

    document.getElementById("successTitle").textContent=t.labels.successTitle;
    document.getElementById("successText").textContent=t.labels.successText;
    document.getElementById("successText2").textContent=t.labels.successText2;

    document.getElementById("projectForm").reset();
    document.getElementById("formArea").style.display="none";
    document.getElementById("successScreen").style.display="block";

    window.scrollTo({top:0,behavior:"smooth"});

  }catch(err){
    console.error(err);
    errorBox.textContent =
      lang==="de" ? "Beim Übermitteln ist ein Fehler aufgetreten. Bitte versuchen Sie es erneut." :
      lang==="en" ? "An error occurred while submitting. Please try again." :
      "Une erreur s’est produite lors de la transmission. Veuillez réessayer.";

    errorBox.style.display="block";
    submitBtn.disabled=false;
    submitBtn.textContent=t.labels.submitBtn;
  }
});

setLang("de");
</script>
